<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant - Home</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="page-root">
    <header class="top-bar">
        <h1>Raspberry Pi AI Assistant</h1>
    </header>

    <main class="layout-main">
        <section class="panel panel-query">
            <h2>Text Query</h2>
            <form id="text-form">
                <textarea id="text-input" rows="4" placeholder="Ask me anything..."></textarea>
                <button type="submit">Send</button>
            </form>
            <div id="response-container">
                <h3>Response</h3>
                <div id="response-text"></div>
            </div>
        </section>

        <section class="panel panel-visual">
            <h2>Visualizer</h2>
            <iframe src="/visualizer" class="visualizer-frame" title="Assistant Visualizer"></iframe>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
